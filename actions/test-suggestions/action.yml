name: "AI Test Suggestions"
description: "Generate PR-level AI test suggestions using OpenAI"

inputs:
  diff:
    description: "Unified git diff for the pull request. Required unless diff_file is provided."
    required: false
  diff_file:
    description: "Path to a UTF-8 file containing the pull request diff. Preferred for large diffs."
    required: false
  pr_title:
    description: "Optional pull request title"
    required: false
  pr_body:
    description: "Optional pull request body"
    required: false
  openai_api_key:
    description: "OpenAI API key"
    required: true
  openai_model:
    description: "OpenAI model name"
    required: false
    default: "gpt-4o-mini"
  openai_base_url:
    description: "Optional OpenAI-compatible API base URL"
    required: false

outputs:
  summary:
    description: "Generated test suggestions summary paragraph"
  body:
    description: "Generated markdown comment body"

runs:
  using: "node20"
  main: "dist/index.js"
