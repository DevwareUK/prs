name: "AI PR Assistant"
description: "Generate and merge a managed PR assistant section with summary, risks, files, testing, rollout, and checklist notes"

inputs:
  diff:
    description: "Unified git diff for the pull request. Required unless diff_file is provided."
    required: false
  diff_file:
    description: "Path to a UTF-8 file containing the pull request diff. Preferred for large diffs."
    required: false
  commit_messages:
    description: "Optional commit messages included in the pull request"
    required: false
  commit_messages_file:
    description: "Optional path to a UTF-8 file containing pull request commit messages"
    required: false
  pr_title:
    description: "Optional pull request title"
    required: false
  pr_body:
    description: "Optional current pull request body"
    required: false
  openai_api_key:
    description: "OpenAI API key"
    required: true
  openai_model:
    description: "OpenAI model name"
    required: false
    default: "gpt-4o-mini"
  openai_base_url:
    description: "Optional OpenAI-compatible API base URL"
    required: false

outputs:
  summary:
    description: "Generated PR assistant summary paragraph"
  section:
    description: "Generated managed PR assistant section markdown with stable reviewer headings"
  body:
    description: "Updated pull request body with the managed PR assistant section"

runs:
  using: "node20"
  main: "dist/index.js"
