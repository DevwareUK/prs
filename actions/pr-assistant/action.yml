name: "AI PR Assistant"
description: "Generate and merge a managed PR assistant section into the pull request body"

inputs:
  diff:
    description: "Unified git diff for the pull request"
    required: true
  commit_messages:
    description: "Optional commit messages included in the pull request"
    required: false
  pr_title:
    description: "Optional pull request title"
    required: false
  pr_body:
    description: "Optional current pull request body"
    required: false
  openai_api_key:
    description: "OpenAI API key"
    required: true
  openai_model:
    description: "OpenAI model name"
    required: false
    default: "gpt-4o-mini"
  openai_base_url:
    description: "Optional OpenAI-compatible API base URL"
    required: false

outputs:
  summary:
    description: "Generated PR assistant summary paragraph"
  section:
    description: "Generated managed PR assistant section markdown"
  body:
    description: "Updated pull request body with the managed PR assistant section"

runs:
  using: "node20"
  main: "dist/index.js"
