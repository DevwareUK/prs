name: "AI PR Description"
description: "Generate PR title and description using OpenAI"

inputs:
  diff:
    description: "Unified git diff for the pull request"
    required: true
  issue_title:
    description: "Optional linked issue title"
    required: false
  issue_body:
    description: "Optional linked issue body"
    required: false
  openai_api_key:
    description: "OpenAI API key"
    required: true
  openai_model:
    description: "OpenAI model name"
    required: false
    default: "gpt-4o-mini"
  openai_base_url:
    description: "Optional OpenAI-compatible API base URL"
    required: false

outputs:
  title:
    description: "Generated PR title"
  body:
    description: "Generated PR body"

runs:
  using: "node20"
  main: "dist/index.js"
