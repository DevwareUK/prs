name: "AI PR Review"
description: "Generate an AI pull request pre-review signal with higher-level findings and line-linked review comments"

inputs:
  diff:
    description: "Unified git diff for the pull request. Required unless diff_file is provided."
    required: false
  diff_file:
    description: "Path to a UTF-8 file containing the pull request diff. Preferred for large diffs."
    required: false
  pr_title:
    description: "Optional pull request title"
    required: false
  pr_body:
    description: "Optional current pull request body"
    required: false
  issue_number:
    description: "Optional linked issue number"
    required: false
  issue_title:
    description: "Optional linked issue title"
    required: false
  issue_body:
    description: "Optional linked issue body"
    required: false
  issue_url:
    description: "Optional linked issue URL"
    required: false
  openai_api_key:
    description: "OpenAI API key"
    required: true
  openai_model:
    description: "OpenAI model name"
    required: false
    default: "gpt-4o-mini"
  openai_base_url:
    description: "Optional OpenAI-compatible API base URL"
    required: false

outputs:
  summary:
    description: "Generated PR pre-review summary"
  body:
    description: "Generated managed PR pre-review comment body"
  findings_json:
    description: "JSON array of higher-level pre-review findings"
  comments_json:
    description: "JSON array of line-linked review comments with severity, confidence, affected file, impact, and optional suggested fix"

runs:
  using: "node20"
  main: "dist/index.js"
