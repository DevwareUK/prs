name: PR Assistant

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: read
  pull-requests: write

jobs:
  pr-assistant:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.7.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          CI: true

      - name: Build workspace
        run: pnpm build

      - name: Generate PR diff
        id: diff
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          {
            echo 'diff<<EOF'
            GIT_AI_DISABLE_AUTO_RUN=1 node -e "const { readReviewDiffForAutomation } = require('./packages/cli/dist/index.js'); process.stdout.write(readReviewDiffForAutomation(process.env.BASE_SHA, process.env.HEAD_SHA));"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Generate PR commit messages
        id: commits
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          {
            echo 'commit_messages<<EOF'
            git log --reverse --format='%s%n%b%n---' "$BASE_SHA..$HEAD_SHA"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Generate PR assistant section
        id: pr_assistant
        uses: ./actions/pr-assistant
        with:
          diff: ${{ steps.diff.outputs.diff }}
          commit_messages: ${{ steps.commits.outputs.commit_messages }}
          pr_title: ${{ github.event.pull_request.title }}
          pr_body: ${{ github.event.pull_request.body }}
          openai_api_key: ${{ secrets.OPENAI_API_KEY }}

      - name: Update PR body
        uses: actions/github-script@v7
        env:
          BODY: ${{ steps.pr_assistant.outputs.body }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              body: process.env.BODY,
            });
