name: Test Suggestions

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: read
  pull-requests: write

jobs:
  test-suggestions:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.7.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        continue-on-error: true
        run: pnpm install --frozen-lockfile
        env:
          CI: true

      - name: Build workspace
        continue-on-error: true
        run: pnpm build

      - name: Generate PR diff
        id: diff
        continue-on-error: true
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          {
            echo 'diff<<EOF'
            GIT_AI_DISABLE_AUTO_RUN=1 node -e "const { readReviewDiffForAutomation } = require('./packages/cli/dist/index.js'); process.stdout.write(readReviewDiffForAutomation(process.env.BASE_SHA, process.env.HEAD_SHA));"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Generate test suggestions
        id: test_suggestions
        if: ${{ steps.diff.outputs.diff != '' }}
        continue-on-error: true
        uses: ./actions/test-suggestions
        with:
          diff: ${{ steps.diff.outputs.diff }}
          pr_title: ${{ github.event.pull_request.title }}
          pr_body: ${{ github.event.pull_request.body }}
          openai_api_key: ${{ secrets.OPENAI_API_KEY }}

      - name: Create or update managed PR comment
        if: ${{ steps.test_suggestions.outputs.body != '' }}
        continue-on-error: true
        uses: actions/github-script@v7
        env:
          TEST_SUGGESTIONS_BODY: ${{ steps.test_suggestions.outputs.body }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const marker = "<!-- git-ai-test-suggestions -->";
            const managedBody = `${marker}\n${process.env.TEST_SUGGESTIONS_BODY}`;
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;

            const comments = await github.paginate(
              github.rest.issues.listComments,
              {
                owner,
                repo,
                issue_number,
                per_page: 100,
              }
            );

            const existingComment = comments.find((comment) => {
              const body = comment.body ?? "";
              return (
                body.includes(marker) &&
                comment.user?.type === "Bot"
              );
            });

            if (existingComment) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existingComment.id,
                body: managedBody,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body: managedBody,
              });
            }
