name: Review Summary

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: read
  pull-requests: write

jobs:
  review-summary:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.7.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          CI: true

      - name: Build workspace
        run: pnpm build

      - name: Generate PR diff
        id: diff
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          {
            echo 'diff<<EOF'
            git diff --unified=3 "$BASE_SHA...$HEAD_SHA"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Generate review summary
        id: review_summary
        uses: ./actions/review-summary
        with:
          diff: ${{ steps.diff.outputs.diff }}
          pr_title: ${{ github.event.pull_request.title }}
          pr_body: ${{ github.event.pull_request.body }}
          openai_api_key: ${{ secrets.OPENAI_API_KEY }}

      - name: Create or update managed PR comment
        uses: actions/github-script@v7
        env:
          REVIEW_SUMMARY_BODY: ${{ steps.review_summary.outputs.body }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const marker = "<!-- git-ai-review-summary -->";
            const managedBody = `${marker}\n${process.env.REVIEW_SUMMARY_BODY}`;
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;

            const comments = await github.paginate(
              github.rest.issues.listComments,
              {
                owner,
                repo,
                issue_number,
                per_page: 100,
              }
            );

            const existingComment = comments.find((comment) => {
              const body = comment.body ?? "";
              return (
                body.includes(marker) &&
                comment.user?.type === "Bot"
              );
            });

            if (existingComment) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existingComment.id,
                body: managedBody,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body: managedBody,
              });
            }
